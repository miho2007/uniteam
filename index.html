<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniTeam Finder | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (localStorage.getItem('dark-mode') === 'true') document.documentElement.classList.add('dark');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal-animate { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .blur-text { filter: blur(5px); transition: filter 0.4s; }
        .toast { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen text-slate-900 dark:text-slate-100 transition-colors">

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3"></div>

    <!-- Custom Modal Structure -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[90] hidden flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white dark:bg-slate-900 w-full max-w-md rounded-3xl p-8 shadow-2xl modal-animate border border-slate-200 dark:border-slate-800">
            <!-- Dynamic Content Injected Here -->
        </div>
    </div>

    <nav class="bg-indigo-700 dark:bg-indigo-900 text-white py-6 shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-2xl font-black italic tracking-tighter">UNITEAM <span class="text-indigo-300">PRO</span></h1>
            <button onclick="toggleDarkMode()" class="p-2 rounded-xl bg-indigo-800 dark:bg-indigo-700 border border-indigo-500">
                <span id="dark-icon">🌙</span>
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-10">
        <!-- Create Form -->
        <section class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 p-8 mb-10">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <span class="w-2 h-6 bg-emerald-500 rounded-full"></span> New Recruitment Post
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                <input id="subject" type="text" placeholder="Subject" class="p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 outline-none focus:ring-2 focus:ring-indigo-500">
                <input id="group" type="text" placeholder="Section" class="p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 outline-none">
                <input id="max" type="number" placeholder="Max Size" class="p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 outline-none">
                <input id="hostName" type="text" placeholder="Your Name" class="p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 outline-none">
                <input id="hostContact" type="text" placeholder="Contact Link" class="p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 outline-none">
                <input id="password" type="password" placeholder="Set Password" class="p-3 rounded-xl bg-orange-50 dark:bg-orange-900/10 border border-orange-200 dark:border-orange-900/30 outline-none">
                <button onclick="createTeam()" id="createBtn" class="lg:col-span-3 bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition-all">Publish Listing</button>
            </div>
        </section>

        <div id="teams-container" class="grid grid-cols-1 gap-8"></div>
    </main>

    <script>
        const API_URL = 'https://69f4baeefb098eb7f0b4ce25.mockapi.io/teams'; 
        let allTeams = [];

        // --- UI HELPERS ---
        function showToast(msg, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast p-4 rounded-2xl shadow-xl border text-sm font-bold flex items-center gap-3 ${type === 'error' ? 'bg-red-50 border-red-200 text-red-600' : 'bg-emerald-50 border-emerald-200 text-emerald-600'}`;
            toast.innerHTML = `<span>${type === 'error' ? '⚠️' : '✅'}</span> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function openModal(contentHtml) {
            const overlay = document.getElementById('modal-overlay');
            document.getElementById('modal-content').innerHTML = contentHtml;
            overlay.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
        }

        // --- CORE LOGIC ---
        async function fetchTeams() {
            const res = await fetch(API_URL);
            allTeams = await res.json();
            renderTeams();
        }

        async function createTeam() {
            const data = {
                subject: document.getElementById('subject').value,
                groupNumber: document.getElementById('group').value,
                maxMembers: parseInt(document.getElementById('max').value),
                hostName: document.getElementById('hostName').value,
                hostContact: document.getElementById('hostContact').value,
                password: document.getElementById('password').value
            };

            if(Object.values(data).some(v => !v)) return showToast("Please fill all fields!");

            await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({...data, currentMembers: 1, applicants: [{name: data.hostName, contact: data.hostContact, isHost: true}]})
            });
            location.reload();
        }

        function promptJoin(id) {
            const team = allTeams.find(t => t.id === id);
            if(team.currentMembers >= team.maxMembers) return showToast("Team is full!");
            
            openModal(`
                <h3 class="text-2xl font-extrabold mb-2">Join Group</h3>
                <p class="text-slate-500 text-sm mb-6 uppercase tracking-widest font-bold">${team.subject}</p>
                <div class="space-y-4">
                    <input id="join-name" type="text" placeholder="Your Name" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 outline-none">
                    <input id="join-contact" type="text" placeholder="Contact (Telegram/WA)" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 outline-none">
                    <button onclick="confirmJoin('${id}')" class="w-full py-4 bg-emerald-500 text-slate-900 font-black rounded-2xl">SUBMIT REQUEST</button>
                    <button onclick="closeModal()" class="w-full text-slate-400 text-xs font-bold uppercase">Cancel</button>
                </div>
            `);
        }

        async function confirmJoin(id) {
            const name = document.getElementById('join-name').value;
            const contact = document.getElementById('join-contact').value;
            if(!name || !contact) return showToast("Details required!");

            const team = allTeams.find(t => t.id === id);
            const updated = [...team.applicants, {name, contact, isHost: false}];

            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({currentMembers: team.currentMembers + 1, applicants: updated})
            });
            closeModal();
            showToast("Successfully joined!", "success");
            fetchTeams();
        }

        function promptUnlock(id) {
            openModal(`
                <h3 class="text-2xl font-extrabold mb-4 text-center">Unlock Privacy</h3>
                <input id="unlock-pass" type="password" placeholder="Enter Team Password" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 outline-none mb-4">
                <button onclick="confirmUnlock('${id}')" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg">VIEW CONTACT LINKS</button>
                <button onclick="closeModal()" class="w-full mt-4 text-slate-400 text-xs font-bold uppercase">Go Back</button>
            `);
        }

        function confirmUnlock(id) {
            const pass = document.getElementById('unlock-pass').value;
            const team = allTeams.find(t => t.id === id);
            if(pass === team.password) {
                closeModal();
                team.applicants.forEach((a, index) => {
                    const el = document.getElementById(`c-${id}-${index}`);
                    if(el) { el.innerText = a.contact; el.classList.remove('blur-text'); el.classList.add('text-indigo-500', 'font-bold'); }
                });
                showToast("Contacts Revealed!", "success");
            } else {
                showToast("Incorrect Password");
            }
        }

        function renderTeams() {
            const container = document.getElementById('teams-container');
            container.innerHTML = '';
            allTeams.sort((a,b) => b.id - a.id).forEach(t => {
                const isFull = t.currentMembers >= t.maxMembers;
                container.innerHTML += `
                    <div class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 overflow-hidden flex flex-col md:flex-row shadow-xl shadow-slate-200/50 dark:shadow-none">
                        <div class="p-8 flex-1">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <h3 class="text-2xl font-black uppercase text-slate-800 dark:text-white leading-tight">${t.subject}</h3>
                                    <p class="text-[10px] font-black text-indigo-500 tracking-[0.3em] mt-1 uppercase">Section ${t.groupNumber}</p>
                                </div>
                                <button onclick="promptUnlock('${t.id}')" class="text-[10px] font-bold text-slate-400 hover:text-indigo-500 border border-slate-100 dark:border-slate-800 px-3 py-1 rounded-lg uppercase">🔑 Reveal</button>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                ${t.applicants.map((a, i) => `
                                    <div class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800/50 rounded-2xl">
                                        <span class="text-xl">${a.isHost ? '👑' : '👤'}</span>
                                        <div class="overflow-hidden">
                                            <p class="text-sm font-bold leading-none mb-1">${a.name}</p>
                                            <p id="c-${t.id}-${i}" class="text-[10px] blur-text text-slate-300 dark:text-slate-600 truncate">HIDDEN_CONTACT</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="p-8 bg-slate-900 md:w-64 flex flex-col items-center justify-center text-white border-t md:border-l border-slate-800">
                            <div class="text-center mb-6">
                                <span class="text-5xl font-black">${t.currentMembers}</span><span class="text-slate-500 font-bold">/${t.maxMembers}</span>
                            </div>
                            <button onclick="promptJoin('${t.id}')" ${isFull ? 'disabled' : ''} class="w-full py-4 rounded-2xl font-black text-xs tracking-widest ${isFull ? 'bg-slate-800 text-slate-500' : 'bg-emerald-500 text-slate-900 shadow-lg shadow-emerald-500/20 active:scale-95'} transition-all uppercase">
                                ${isFull ? 'FULL' : 'JOIN GROUP'}
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('dark-mode', isDark);
            document.getElementById('dark-icon').innerText = isDark ? '☀️' : '🌙';
        }

        fetchTeams();
    </script>
</body>
</html>
