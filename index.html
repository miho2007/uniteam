<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniTeam Finder | Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .member-row:not(:last-child) { border-bottom: 1px solid #f1f5f9; }
        .team-card { transition: transform 0.2s; }
        .team-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10 font-sans">

    <!-- Header -->
    <nav class="bg-indigo-700 text-white p-6 mb-8 shadow-xl">
        <div class="max-w-5xl mx-auto">
            <h1 class="text-2xl font-black italic tracking-tighter">UNITEAM <span class="text-indigo-300">SECURE</span></h1>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4">
        
        <!-- Create Team -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
            <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-4">Post a Team</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <input id="subject" type="text" placeholder="Subject Name" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input id="group" type="text" placeholder="Group/Section #" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input id="max" type="number" placeholder="Max Team Size" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input id="hostName" type="text" placeholder="Your Name (Host)" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input id="hostContact" type="text" placeholder="Your Contact Link" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input id="password" type="password" placeholder="Set Delete Password" class="p-3 bg-orange-50 border border-orange-100 rounded-xl outline-none focus:ring-2 focus:ring-orange-400">
                <button onclick="createTeam()" class="lg:col-span-3 bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">Create Team</button>
            </div>
        </section>

        <!-- Search -->
        <div class="mb-8 relative">
            <input id="search" type="text" oninput="renderTeams()" placeholder="🔍 Filter by subject or group..." 
                class="w-full p-4 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-indigo-400 outline-none text-lg">
        </div>

        <div id="loading" class="text-center py-10 text-slate-400">Loading groups...</div>
        <div id="teams-container" class="grid grid-cols-1 gap-6"></div>
    </main>

    <script>
        const API_URL = 'https://69f4baeefb098eb7f0b4ce25.mockapi.io/teams'; 
        let allTeams = [];

        async function fetchTeams() {
            try {
                const res = await fetch(API_URL);
                allTeams = await res.json();
                document.getElementById('loading').classList.add('hidden');
                renderTeams();
            } catch (err) {
                document.getElementById('loading').innerText = "Database connection error.";
            }
        }

        async function createTeam() {
            const fields = ['subject', 'group', 'max', 'hostName', 'hostContact', 'password'];
            const data = {};
            fields.forEach(f => data[f] = document.getElementById(f).value);

            if(Object.values(data).some(v => !v)) return alert("Fill all fields, including the password!");

            const newTeam = {
                subject: data.subject,
                groupNumber: data.group,
                maxMembers: parseInt(data.max),
                password: data.password, // Saved to DB
                currentMembers: 1,
                applicants: [{ name: data.hostName, contact: data.hostContact, isHost: true }]
            };

            await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(newTeam)
            });

            location.reload();
        }

        async function joinTeam(id) {
            const team = allTeams.find(t => t.id === id);
            if (team.currentMembers >= team.maxMembers) return alert("Full!");

            const name = prompt("Your Name:");
            if (!name) return;
            const contact = prompt("Your Contact (Telegram/WA):");
            if (!contact) return;

            const updatedApplicants = [...(team.applicants || []), { name, contact }];

            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    currentMembers: team.currentMembers + 1,
                    applicants: updatedApplicants
                })
            });
            fetchTeams();
        }

        async function deleteTeam(id) {
            const team = allTeams.find(t => t.id === id);
            const inputPass = prompt("Enter the password for this post to delete it:");
            
            if (inputPass === team.password) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                fetchTeams();
            } else {
                alert("Incorrect password! Only the host can delete this post.");
            }
        }

        function renderTeams() {
            const query = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('teams-container');
            container.innerHTML = '';

            const filtered = allTeams.filter(t => 
                t.subject.toLowerCase().includes(query) || 
                t.groupNumber.toLowerCase().includes(query)
            );

            filtered.forEach(t => {
                const isFull = t.currentMembers >= t.maxMembers;
                const apps = t.applicants || [];

                container.innerHTML += `
                    <div class="team-card bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col md:flex-row">
                        <div class="p-6 flex-1">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="text-2xl font-black text-slate-800 tracking-tight underline decoration-indigo-200">${t.subject}</h3>
                                <span class="text-xs font-bold px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full">GROUP ${t.groupNumber}</span>
                            </div>
                            
                            <div class="space-y-2">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Members & Applicants</p>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                    ${apps.map(a => `
                                        <div class="p-2 bg-slate-50 rounded-lg border border-slate-100 flex flex-col">
                                            <span class="text-sm font-bold text-slate-700">${a.name} ${a.isHost ? '👑' : ''}</span>
                                            <span class="text-xs text-indigo-500 truncate">${a.contact}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>

                        <div class="p-6 bg-slate-900 md:w-56 flex flex-col items-center justify-center text-white text-center border-t md:border-t-0 border-slate-800">
                            <span class="text-4xl font-black">${t.currentMembers}/${t.maxMembers}</span>
                            <span class="text-[10px] uppercase font-bold text-slate-400 mb-4 tracking-tighter">Team Capacity</span>
                            
                            <button onclick="joinTeam('${t.id}')" 
                                class="w-full py-3 rounded-xl font-bold transition mb-3
                                ${isFull ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-emerald-500 hover:bg-emerald-600 active:scale-95'}"
                                ${isFull ? 'disabled' : ''}>
                                ${isFull ? 'CLOSED' : 'JOIN +'}
                            </button>
                            
                            <button onclick="deleteTeam('${t.id}')" class="text-[10px] text-slate-500 hover:text-red-400 uppercase font-bold tracking-widest">Remove Post 🔒</button>
                        </div>
                    </div>
                `;
            });
        }

            fetchTeams();
    </script>
</body>
</html>
